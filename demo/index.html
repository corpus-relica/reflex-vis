<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reflex Devtools — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    header h1 span { color: #4fc3f7; }
    .controls {
      padding: 12px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .control-group {
      display: flex;
      gap: 6px;
      align-items: center;
      padding-right: 12px;
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    .control-group:last-child { border-right: none; }
    .control-group label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
    }
    select, input[type="number"] {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      color: #e0e0e0;
      padding: 4px 8px;
      font-size: 12px;
      outline: none;
    }
    select:focus, input:focus { border-color: #4fc3f7; }
    input[type="number"] { width: 70px; }
    button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      color: #e0e0e0;
      padding: 4px 12px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: rgba(255,255,255,0.15); border-color: #4fc3f7; }
    button:active { background: rgba(79,195,247,0.2); }
    #devtools-container {
      flex: 1;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
    }
    #devtools-container [data-rx-devtools] {
      width: 100%;
      flex: 1;
    }
  </style>
</head>
<body>
  <header>
    <h1><span>Reflex</span> Devtools Demo</h1>
  </header>

  <div class="controls">
    <div class="control-group">
      <label>Workflow</label>
      <select id="workflow-select">
        <option value="linear-demo">Linear (4 nodes)</option>
        <option value="branching-demo">Branching (guards)</option>
        <option value="nested-demo">Nested (sub-workflow)</option>
      </select>
      <button id="btn-init">Init</button>
    </div>

    <div class="control-group">
      <label>Step</label>
      <button id="btn-step">Step</button>
      <button id="btn-autoplay">Auto</button>
      <button id="btn-stop">Stop</button>
      <input type="number" id="speed-input" value="800" min="100" max="5000" step="100" />
      <label>ms</label>
    </div>

    <div class="control-group">
      <label>Data</label>
      <button id="btn-write-bb">Write BB</button>
    </div>

    <div class="control-group">
      <label>Stack</label>
      <button id="btn-push">Push</button>
      <button id="btn-pop">Pop</button>
    </div>

    <div class="control-group">
      <label>Engine</label>
      <button id="btn-suspend">Suspend</button>
      <button id="btn-complete">Complete</button>
    </div>
  </div>

  <div id="devtools-container"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
